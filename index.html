                enrollmentIndex: "--"
            },
            {
                code: "9111",
               district: "north"
                nameEn: "Baptist (Sha Tin Wai) Lui Ming Choi Primary School",
                nameCh: "жөёдҝЎжңғжІҷз”°еңҚе‘ӮжҳҺжүҚе°Ҹеӯё ",
                alias: "жІҷе‘Ӯ",
                link: "жңӘжңү",
                interviewDate: "жңӘжңү",
                remarks: "з„Ў",
                goodSchool: "https://www.goodschool.hk/%E6%B5%B8%E4%BF%A1%E6%9C%83%E6%B2%99%E7%94%B0%E5%9C%8D%E5%91%82%E6%98%8E%E6%89%8D%E5%B0%8F%E5%AD%B8",

        ];

        // еҝ«жҚ·жЁҷзұӨиЁӯе®ҡеҮҪејҸ
        function setKeyword(word) {
            document.getElementById('searchInput').value = word;
            doSearch();

        // ж ёеҝғжҗңе°Ӣеј•ж“ҺпјҲйҳІе‘ҶгҖҒеӨ§е°ҸеҜ«з„Ўе·®еҲҘгҖҒе…Ёж–№дҪҚжЁЎзіҠеҢ№й…Қпјү
        function doSearch() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            const container = document.getElementById('schoolsContainer');
            
            // йҒҺжҝҫз¬ҰеҗҲжўқд»¶зҡ„еӯёж Ў
            const filtered = schoolDatabase.filter(school => {
                return school.code.toLowerCase().includes(query) ||
                       school.nameEn.toLowerCase().includes(query) ||
                       school.nameCh.toLowerCase().includes(query) ||
                       school.alias.toLowerCase().includes(query) ||
                       school.interviewDate.toLowerCase().includes(query) ||
                       school.remarks.toLowerCase().includes(query);
            });

            // жӣҙж–°иЁҲж•ёйЎҜзӨә
            document.getElementById('resultCount').innerText = `е·ІзӮәжӮЁзҜ©йҒёеҮә ${filtered.length} й–“з¬ҰеҗҲжўқд»¶зҡ„еӯёж Ў`;

            // жё…з©әе®№еҷЁйҮҚж–°жёІжҹ“
            container.innerHTML = '';

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 bg-amber-50/30 rounded-2xl border border-dashed border-amber-200">
                        <p class="text-amber-600 font-medium text-lg">жІ’жңүжүҫеҲ°зӣёй—ңеӯёж ЎпјҢи«Ӣеҳ—и©Ұијёе…Ҙе…¶д»–й—ңйҚөеӯ—гҖӮ</p>
                    </div>`;
                return;
            }

            // жёІжҹ“еӯёж ЎеҚЎзүҮ
            filtered.forEach(school => {
                // иҷ•зҗҶйҖЈзөҗжҢүйҲ•зӢҖж…Ӣ
                const linkBtn = school.link !== "жңӘжңү" 
                    ? `<a href="${school.link}" target="_blank" class="inline-flex items-center justify-center px-4 py-2 bg-amber-600 hover:bg-amber-700 text-white font-medium rounded-lg text-sm transition shadow-sm">рҹ”— еүҚеҫҖеҸ©й–Җе®ҳз¶І</a>`
                    : `<button disabled class="inline-flex items-center justify-center px-4 py-2 bg-gray-200 text-gray-400 font-medium rounded-lg text-sm cursor-not-allowed">е°ҡжңӘе…¬дҪҲйҖЈзөҗ</button>`;

                // иҷ•зҗҶеӮҷиЁ»й«ҳдә®
                const remarkBadge = school.remarks !== "з„Ў" 
                    ? `<div class="mt-3 p-2.5 bg-rose-50 border border-rose-100 rounded-lg text-xs text-rose-700 font-medium">вҡ пёҸ еӮҷиЁ»пјҡ${school.remarks}</div>` 
                    : '';

                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-xs border border-amber-100/80 p-5 hover:shadow-md hover:border-amber-200 transition-all duration-200";
                card.innerHTML = `
                    <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-4">
                        <!-- е·ҰеҒҙпјҡеӯёж Ўеҹәжң¬еҗҚзЁұ -->
                        <div class="space-y-1">
                            <div class="flex items-center gap-2 flex-wrap">
                                <span class="bg-amber-100 text-amber-800 text-xs font-bold px-2 py-0.5 rounded-sm">${school.code}</span>
                                <span class="bg-orange-100 text-orange-800 text-xs font-medium px-2 py-0.5 rounded-sm">${school.alias}</span>
                                <a href="${school.goodSchool}" target="_blank" class="text-xs text-blue-600 hover:underline inline-flex items-center gap-0.5">
                                    GoodSchool рҹ“„
                                </a>
                            </div>
                            <h2 class="text-xl font-bold text-gray-900">${school.nameCh}</h2>
                            <p class="text-xs text-gray-500 font-mono">${school.nameEn}</p>
                        </div>

                        <!-- еҸіеҒҙпјҡж•ёж“ҡжҢҮжЁҷиҲҮеӢ•дҪң -->
                        <div class="flex flex-col sm:flex-row md:flex-col lg:flex-row items-stretch sm:items-center md:items-end lg:items-center gap-3 shrink-0">
                            <!-- жҢҮжЁҷзө„ -->
                            <div class="grid grid-cols-2 gap-2 bg-amber-50/40 p-2 rounded-lg border border-amber-100/50 text-center sm:text-left min-w-[220px]">
                                <div>
                                    <p class="text-[10px] text-amber-600 uppercase font-bold tracking-wider">ж•ҷеё«з©©е®ҡжҢҮж•ё</p>
                                    <p class="text-sm font-black text-amber-900">${school.teacherStability}</p>
                                </div>
                                <div class="border-l border-amber-100 pl-2">
                                    <p class="text-[10px] text-amber-600 uppercase font-bold tracking-wider">ж”¶з”ҹе……и¶іжҢҮж•ё</p>
                                    <p class="text-sm font-black ${school.enrollmentIndex.startsWith('100') ? 'text-emerald-700' : 'text-amber-800'}">${school.enrollmentIndex}</p>
                                </div>
                            </div>
                            <!-- иЎҢеӢ•жҢүйҲ• -->
                            <div class="flex items-center">
                                ${linkBtn}
                            </div>
                        </div>
                    </div>

                    <!-- дёӢж–№пјҡеҸ©й–ҖжҷӮзЁӢеҚҖ -->
                    <div class="mt-4 pt-3 border-t border-dashed border-gray-100 flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-6 text-sm">
                        <div class="flex items-center gap-1.5 text-gray-700">
                            <span class="text-amber-500 font-bold">рҹ“… йқўи©Ұж—Ҙжңҹ:</span>
                            <span class="${school.interviewDate === 'жңӘжңү' ? 'text-gray-400 italic' : 'text-amber-900 font-semibold'}">${school.interviewDate}</span>
                        </div>
                    </div>
                    ${remarkBadge}
                `;
                container.appendChild(card);
            });
        }

        // еҲқе§ӢйҒӢиЎҢпјҢијүе…Ҙе…ЁйғЁиіҮж–ҷ
        window.onload = function() {
            doSearch();
        };
    </script>
